# ============================================================
# GitIntel Nginx 反向代理配置
#
# 功能：
#   - 将静态请求和 NextAuth 路由转发到前端（Next.js）
#   - 将业务 API 请求转发到后端（FastAPI）
#   - HTTPS 配置（需要配合 Let's Encrypt 使用 certbot）
#   - WebSocket 支持（SSE 流式响应）
#   - 静态文件缓存优化
#
# 安装位置：
#   - /etc/nginx/sites-available/gitintel
#   - 软链接到 /etc/nginx/sites-enabled/gitintel
#
# 使用 certbot 自动续期 HTTPS：
#   certbot --nginx -d gitintel.top
# ============================================================

upstream gitintel_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream gitintel_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP 服务器（80 端口）
server {
    listen 80;
    server_name _;

    # 如果有域名，取消下面的注释并填入域名
    # server_name gitintel.top www.gitintel.top;

    # HTTP 自动跳转到 HTTPS（certbot 会自动添加）
    # return 301 https://$host$request_uri;

    # 根路径转发到前端
    location / {
        proxy_pass http://gitintel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NextAuth 路由（/api/auth/*）必须转发到前端 Next.js
    location /api/auth/ {
        proxy_pass http://gitintel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # NextAuth 需要这些 header
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # 业务 API 请求全部经过前端 BFF 层鉴权，再由 BFF 转发到后端
    # 前端 Route Handler 会从 NextAuth session 中注入 X-User-Id header
    location /api/ {
        proxy_pass http://gitintel_frontend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传浏览器原始 cookie，便于前端 BFF 验证 session
        proxy_set_header Cookie $http_cookie;

        # SSE 流式响应必需配置
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://gitintel_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}


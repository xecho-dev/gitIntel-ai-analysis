# ============================================================
# GitIntel — Docker Compose 部署配置
#
# 用法：
#   1. 复制 .env.example 为 .env，填入真实密钥
#   2. 运行：docker compose up -d --build
#   3. 访问：http://<服务器IP>:3000
# ============================================================

services:
  # ── Frontend — Next.js 15 ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      # 构建时注入的公开变量（BUILD TIME，必须在这里传）
      # NEXT_PUBLIC_* 必须在构建时 bake 进客户端 bundle
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        # NextAuth v5：使用 AUTH_* 前缀（服务端运行时变量，不走 NEXT_PUBLIC_）
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3000}
    container_name: gitintel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # NextAuth v5 关键配置
      AUTH_URL: ${AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
    networks:
      - gitintel-net

  # ── Backend — FastAPI Agent Layer ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gitintel-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    # 读取 backend/.env 中的变量（包含 API keys）
    env_file:
      - ./backend/.env
    environment:
      # 运行时额外变量（可覆盖或补充 .env）
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # GitHub 操作权限 Token
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # OpenAI（Agent 层调用 LLM）
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    networks:
      - gitintel-net

networks:
  gitintel-net:
    driver: bridge

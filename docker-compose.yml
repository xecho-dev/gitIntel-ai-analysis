# ============================================================
# GitIntel — Docker Compose 部署配置
#
# 用法：
#   1. 复制 .env.example 为 .env，填入真实密钥
#   2. 运行：docker compose up -d --build
#   3. 访问：http://<服务器IP>:3000
# ============================================================

services:
  # ── Frontend — Next.js 15 ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      # 构建时注入的公开变量（BUILD TIME，必须在这里传）
      # NEXT_PUBLIC_* 必须在构建时 bake 进客户端 bundle
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    container_name: gitintel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET}
    networks:
      - gitintel-net
    env_file:
      - ./deploy.env

  # ── Backend — FastAPI Agent Layer ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gitintel-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    # 读取 backend/.env 中的变量（包含 API keys）
    env_file:
      - ./backend/.env
    environment:
      # 运行时额外变量（可覆盖或补充 .env）
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # NextAuth JWT 签名密钥（必须与前端 AUTH_SECRET 一致）
      AUTH_SECRET: ${AUTH_SECRET}
      # GitHub 操作权限 Token
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      # OpenAI（Agent 层调用 LLM）
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # DashVector（RAG 向量存储）
      DASHVECTOR_API_KEY: ${DASHVECTOR_API_KEY}
      DASHVECTOR_ENDPOINT: ${DASHVECTOR_ENDPOINT:-dashvector.aliyuncs.com}
      DASHVECTOR_COLLECTION: ${DASHVECTOR_COLLECTION:-gitintel_knowledge}
    networks:
      - gitintel-net

networks:
  gitintel-net:
    driver: bridge

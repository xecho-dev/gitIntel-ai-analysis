# ============================================================
# GitIntel Deploy — 生产部署流水线
#
# 触发条件：
#   - main 分支的 push（合并 PR 或直接推送）
#
# 流程：
#   1. 构建前后端 Docker 镜像
#   2. 将镜像保存为 tar 文件
#   3. 通过 SSH/SCP 将 tar 文件传输到服务器
#   4. 服务器加载镜像并重启容器
#   5. 健康检查确认部署成功
#
# 需要的 Secrets（请在 GitHub 仓库 Settings > Secrets 中配置）：
#   SERVER_HOST          - 服务器 IP 或域名（如 gitintel.top 或 47.80.59.132）
#   SERVER_USER          - 服务器用户名（如 root 或 deploy）
#   SERVER_SSH_KEY      - SSH 私钥（用于连接服务器）
#   FRONTEND_URL         - 前端实际访问地址（必须包含协议，如 https://your-domain.com）
#   OPENAI_API_KEY       - OpenAI API 密钥
#   SUPABASE_URL         - Supabase 项目 URL
#   SUPABASE_ANON_KEY    - Supabase 匿名密钥
#   SUPABASE_SERVICE_KEY - Supabase Service Role 密钥（后台管理员权限）
#   AUTH_SECRET          - NextAuth JWT 签名密钥
#   AUTH_GITHUB_ID       - GitHub OAuth App Client ID
#   AUTH_GITHUB_SECRET   - GitHub OAuth App Client Secret
#   AUTH_URL             - 前端访问地址（同 FRONTEND_URL，用于 OAuth 回调）
#   LANGSMITH_TRACING    - LangSmith 链路追踪开关（如 true）
#   LANGSMITH_ENDPOINT   - LangSmith API 端点（如 https://api.smith.langchain.com）
#   LANGSMITH_PROJECT    - LangSmith 项目名称
#   LANGSMITH_API_KEY    - LangSmith API Key
#   DASHVECTOR_API_KEY   - DashVector API 密钥
#   DASHVECTOR_ENDPOINT  - DashVector 服务地址（默认 dashvector.aliyuncs.com）
#   DASHVECTOR_COLLECTION - DashVector Collection 名称（默认 gitintel_knowledge）
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  # 手动触发 CD（需要先在 GitHub 仓库 Settings > Variables 中设置 DEPLOY_TO_SERVER = true）
  workflow_dispatch:
    inputs:
      deploy_to_server:
        description: "部署到服务器（需先配置 SERVER_SSH_KEY secret）"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  # 使用小写的仓库名作为镜像前缀
  IMAGE_PREFIX: ${{ github.repository_owner }}/gitintel
  DEPLOY_PATH: /opt/gitintel

jobs:
  # ==================== 构建 Docker 镜像 ====================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      commit_short: ${{ steps.vars.outputs.commit_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # --- 前端镜像构建 ---
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHP_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./Dockerfile.frontend
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_URL }}/api
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AUTH_URL=${{ secrets.FRONTEND_URL }}
            AUTH_GITHUB_ID=${{ secrets.AUTH_GITHUB_ID }}
            AUTH_GITHUB_SECRET=${{ secrets.AUTH_GITHUB_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.FRONTEND_URL }}

      # --- 后端镜像构建 ---
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./Dockerfile.backend
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache

  # ==================== 部署到服务器 ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: production
    # 仅在 GitHub variable DEPLOY_TO_SERVER=true 时触发
    if: ${{ github.event.inputs.deploy_to_server == 'true' || (github.event_name == 'push' && vars.DEPLOY_TO_SERVER == 'true') }}

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/
          sparse-checkout-cone-mode: false

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # --- 传输环境变量文件 ---
      - name: Prepare environment file
        run: |
          cat > deploy/env << 'ENVFILE'
          # Supabase 配置
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}

          # OpenAI 配置
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}

          # GitHub Token（访问私有仓库）
          GITHUB_TOKEN=${{ secrets.GHP_TOKEN }}

          # 前端访问地址（用于后端 CORS 白名单）
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}

          # NextAuth 密钥
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_URL=${{ secrets.FRONTEND_URL }}

          # GitHub OAuth 配置（前端构建时已嵌入，此处保留用于兼容）
          AUTH_GITHUB_ID=${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET=${{ secrets.AUTH_GITHUB_SECRET }}

          # GitHub Container Registry 配置（用于服务器拉取镜像）
          REGISTRY=${{ env.REGISTRY }}
          REGISTRY_USERNAME=${{ github.actor }}
          REGISTRY_TOKEN=${{ secrets.GHP_TOKEN }}

          # LangSmith（链路追踪，可选）
          LANGSMITH_TRACING=${{ secrets.LANGSMITH_TRACING }}
          LANGSMITH_ENDPOINT=${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}

          # DashVector（RAG 向量存储）
          DASHVECTOR_API_KEY=${{ secrets.DASHVECTOR_API_KEY }}
          DASHVECTOR_ENDPOINT=${{ secrets.DASHVECTOR_ENDPOINT }}
          DASHVECTOR_COLLECTION=${{ secrets.DASHVECTOR_COLLECTION }}
          ENVFILE

      - name: Upload env file to server
        run: |
          scp -o StrictHostKeyChecking=no deploy/env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/gitintel.env

      # --- 执行远程部署脚本 ---
      - name: Deploy to server
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/frontend:latest"
          BACKEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/backend:latest"
          SERVER_USER="${{ secrets.SERVER_USER }}"
          SERVER_HOST="${{ secrets.SERVER_HOST }}"
          REGISTRY="${{ env.REGISTRY }}"
          REGISTRY_USERNAME="${{ github.actor }}"
          REGISTRY_TOKEN="${{ secrets.GHP_TOKEN }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          AUTH_GITHUB_ID="${{ secrets.AUTH_GITHUB_ID }}"
          AUTH_GITHUB_SECRET="${{ secrets.AUTH_GITHUB_SECRET }}"
          AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
          AUTH_URL="${{ secrets.FRONTEND_URL }}"
          LANGSMITH_TRACING="${{ secrets.LANGSMITH_TRACING }}"
          LANGSMITH_ENDPOINT="${{ secrets.LANGSMITH_ENDPOINT }}"
          LANGSMITH_PROJECT="${{ secrets.LANGSMITH_PROJECT }}"
          LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}"
          DASHVECTOR_API_KEY="${{ secrets.DASHVECTOR_API_KEY }}"
          DASHVECTOR_ENDPOINT="${{ secrets.DASHVECTOR_ENDPOINT }}"
          DASHVECTOR_COLLECTION="${{ secrets.DASHVECTOR_COLLECTION }}"
          DEPLOY_PATH="/opt/gitintel"
          COMMIT_SHORT="${{ needs.build.outputs.commit_short }}"

          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST bash -s << ENDSSH
          set -e
          echo "========== 开始部署 GitIntel =========="
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Commit: $COMMIT_SHORT"

          sudo mkdir -p $DEPLOY_PATH
          sudo chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH
          cd $DEPLOY_PATH
          mv /tmp/gitintel.env .env

          cat > docker-compose.yml << DOCKERCOMPOSE
          services:
            frontend:
              image: FRONTEND_IMAGE_PLACEHOLDER
              container_name: gitintel-frontend
              restart: unless-stopped
              ports:
                - "3000:3000"
              environment:
                NODE_ENV: production
                AUTH_TRUST_HOST: "true"
                AUTH_URL: AUTH_URL_PLACEHOLDER
                AUTH_GITHUB_ID: AUTH_GITHUB_ID_PLACEHOLDER
                AUTH_GITHUB_SECRET: AUTH_GITHUB_SECRET_PLACEHOLDER
                AUTH_SECRET: AUTH_SECRET_PLACEHOLDER
              env_file:
                - .env
              networks:
                - gitintel-net
              healthcheck:
                test: ["CMD", "curl", "-sf", "http://localhost:3000"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

            backend:
              image: BACKEND_IMAGE_PLACEHOLDER
              container_name: gitintel-backend
              restart: unless-stopped
              ports:
                - "8000:8000"
              env_file:
                - .env
              environment:
                FRONTEND_URL: FRONTEND_URL_PLACEHOLDER
                LANGSMITH_TRACING: LANGSMITH_TRACING_PLACEHOLDER
                LANGSMITH_ENDPOINT: LANGSMITH_ENDPOINT_PLACEHOLDER
                LANGSMITH_PROJECT: LANGSMITH_PROJECT_PLACEHOLDER
                LANGSMITH_API_KEY: LANGSMITH_API_KEY_PLACEHOLDER
                DASHVECTOR_API_KEY: DASHVECTOR_API_KEY_PLACEHOLDER
                DASHVECTOR_ENDPOINT: DASHVECTOR_ENDPOINT_PLACEHOLDER
                DASHVECTOR_COLLECTION: DASHVECTOR_COLLECTION_PLACEHOLDER
              networks:
                - gitintel-net
              healthcheck:
                test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 30s

          networks:
            gitintel-net:
              driver: bridge
          DOCKERCOMPOSE

          sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|$FRONTEND_IMAGE|g" docker-compose.yml
          sed -i "s|BACKEND_IMAGE_PLACEHOLDER|$BACKEND_IMAGE|g" docker-compose.yml
          sed -i "s|FRONTEND_URL_PLACEHOLDER|$FRONTEND_URL|g" docker-compose.yml
          sed -i "s|AUTH_URL_PLACEHOLDER|$AUTH_URL|g" docker-compose.yml
          sed -i "s|AUTH_GITHUB_ID_PLACEHOLDER|$AUTH_GITHUB_ID|g" docker-compose.yml
          sed -i "s|AUTH_GITHUB_SECRET_PLACEHOLDER|$AUTH_GITHUB_SECRET|g" docker-compose.yml
          sed -i "s|AUTH_SECRET_PLACEHOLDER|$AUTH_SECRET|g" docker-compose.yml
          sed -i "s|LANGSMITH_TRACING_PLACEHOLDER|$LANGSMITH_TRACING|g" docker-compose.yml
          sed -i "s|LANGSMITH_ENDPOINT_PLACEHOLDER|$LANGSMITH_ENDPOINT|g" docker-compose.yml
          sed -i "s|LANGSMITH_PROJECT_PLACEHOLDER|$LANGSMITH_PROJECT|g" docker-compose.yml
          sed -i "s|LANGSMITH_API_KEY_PLACEHOLDER|$LANGSMITH_API_KEY|g" docker-compose.yml
          sed -i "s|DASHVECTOR_API_KEY_PLACEHOLDER|$DASHVECTOR_API_KEY|g" docker-compose.yml
          sed -i "s|DASHVECTOR_ENDPOINT_PLACEHOLDER|$DASHVECTOR_ENDPOINT|g" docker-compose.yml
          sed -i "s|DASHVECTOR_COLLECTION_PLACEHOLDER|$DASHVECTOR_COLLECTION|g" docker-compose.yml

          # ==================== 配置 Nginx 反向代理 ====================
          echo "正在配置 Nginx..."

          # 备份并安装 Nginx 配置
          if [ -f /etc/nginx/conf.d/gitintel.conf ]; then
            sudo cp /etc/nginx/conf.d/gitintel.conf /etc/nginx/conf.d/gitintel.conf.bak
          fi
          sudo cp deploy/nginx.conf /etc/nginx/conf.d/gitintel.conf

          # 测试并重载 Nginx
          sudo nginx -t && sudo nginx -s reload
          echo "Nginx 配置完成"

          echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u $REGISTRY_USERNAME --password-stdin
          echo "正在拉取镜像..."
          docker-compose pull
          echo "正在清理旧容器..."
          docker stop gitintel-frontend gitintel-backend 2>/dev/null || true
          docker rm gitintel-frontend gitintel-backend 2>/dev/null || true
          echo "正在启动服务..."
          docker-compose up -d
          sleep 10

          echo ""
          echo "========== 容器状态 =========="
          docker-compose ps

          FRONTEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' gitintel-frontend 2>/dev/null)
          BACKEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' gitintel-backend 2>/dev/null)
          FRONTEND_HEALTH=${FRONTEND_HEALTH:-unknown}
          BACKEND_HEALTH=${BACKEND_HEALTH:-unknown}

          echo ""
          echo "Frontend 健康状态: $FRONTEND_HEALTH"
          echo "Backend 健康状态: $BACKEND_HEALTH"

          if [ "$FRONTEND_HEALTH" = "healthy" ] && [ "$BACKEND_HEALTH" = "healthy" ]; then
            echo ""
            echo "✅ 部署成功！"
          else
            echo ""
            echo "⚠️ 容器已启动，部分健康检查可能需要更长时间"
          fi

          echo ""
          echo "========== 部署完成 =========="
          ENDSSH


# ============================================================
# GitIntel Deploy — 生产部署流水线
#
# 触发条件：
#   - main 分支的 push（合并 PR 或直接推送）
#
# 流程：
#   1. 构建前后端 Docker 镜像
#   2. 将镜像保存为 tar 文件
#   3. 通过 SSH/SCP 将 tar 文件传输到服务器
#   4. 服务器加载镜像并重启容器
#   5. 健康检查确认部署成功
#
# 需要的 Secrets（请在 GitHub 仓库 Settings > Secrets 中配置）：
#   SERVER_HOST        - 服务器 IP（如 47.80.59.132）
#   SERVER_USER        - 服务器用户名（如 root 或 deploy）
#   SERVER_SSH_KEY     - SSH 私钥（用于连接服务器）
#   FRONTEND_URL       - 前端实际访问地址（用于 CORS 配置）
#   OPENAI_API_KEY     - OpenAI API 密钥
#   SUPABASE_URL       - Supabase 项目 URL
#   SUPABASE_ANON_KEY  - Supabase 匿名密钥
#   SUPABASE_SERVICE_ROLE_KEY - Supabase Service Role 密钥
#   SUPABASE_JWT_SECRET - Supabase JWT Secret
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  # 手动触发 CD（需要先在 GitHub 仓库 Settings > Variables 中设置 DEPLOY_TO_SERVER = true）
  workflow_dispatch:
    inputs:
      deploy_to_server:
        description: "部署到服务器（需先配置 SERVER_SSH_KEY secret）"
        required: false
        default: "false"

env:
  REGISTRY: ghcr.io
  # 使用小写的仓库名作为镜像前缀
  IMAGE_PREFIX: ${{ github.repository_owner }}/gitintel
  DEPLOY_PATH: /opt/gitintel

jobs:
  # ==================== 构建 Docker 镜像 ====================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      commit_short: ${{ steps.vars.outputs.commit_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # --- 前端镜像构建 ---
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./Dockerfile.frontend
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.FRONTEND_URL }}/api
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_AUTH_URL=${{ secrets.FRONTEND_URL }}

      # --- 后端镜像构建 ---
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./Dockerfile.backend
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache

  # ==================== 部署到服务器 ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: production
    # 仅在 GitHub variable DEPLOY_TO_SERVER=true 时触发
    if: ${{ github.event.inputs.deploy_to_server == 'true' || (github.event_name == 'push' && vars.DEPLOY_TO_SERVER == 'true') }}

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/
          sparse-checkout-cone-mode: false

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # --- 传输环境变量文件 ---
      - name: Prepare environment file
        run: |
          cat > deploy/env << 'ENVFILE'
          # Supabase 配置
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}

          # OpenAI 配置
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}

          # GitHub Token（访问私有仓库）
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

          # 前端访问地址（用于后端 CORS 白名单）
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}

          # GitHub Container Registry 配置（用于服务器拉取镜像）
          REGISTRY=${{ env.REGISTRY }}
          REGISTRY_USERNAME=${{ github.actor }}
          REGISTRY_TOKEN=${{ secrets.GITHUB_TOKEN }}
          ENVFILE

      - name: Upload env file to server
        run: |
          scp -o StrictHostKeyChecking=no deploy/env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/gitintel.env

      # --- 执行远程部署脚本 ---
      - name: Deploy to server
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/frontend:latest"
          BACKEND_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/backend:latest"
          SERVER_USER="${{ secrets.SERVER_USER }}"
          SERVER_HOST="${{ secrets.SERVER_HOST }}"
          REGISTRY="${{ env.REGISTRY }}"
          REGISTRY_USERNAME="${{ github.actor }}"
          REGISTRY_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          DEPLOY_PATH="/opt/gitintel"
          COMMIT_SHORT="${{ needs.build.outputs.commit_short }}"

          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST bash -s << ENDSSH
          set -e
          echo "========== 开始部署 GitIntel =========="
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Commit: $COMMIT_SHORT"

          sudo mkdir -p $DEPLOY_PATH
          sudo chown -R $SERVER_USER:$SERVER_USER $DEPLOY_PATH
          cd $DEPLOY_PATH
          mv /tmp/gitintel.env .env

          cat > docker-compose.yml << DOCKERCOMPOSE
          services:
            frontend:
              image: FRONTEND_IMAGE_PLACEHOLDER
              container_name: gitintel-frontend
              restart: unless-stopped
              ports:
                - "3000:3000"
              environment:
                NODE_ENV: production
                AUTH_TRUST_HOST: "true"
              env_file:
                - .env
              networks:
                - gitintel-net
              healthcheck:
                test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

            backend:
              image: BACKEND_IMAGE_PLACEHOLDER
              container_name: gitintel-backend
              restart: unless-stopped
              ports:
                - "8000:8000"
              env_file:
                - .env
              environment:
                FRONTEND_URL: FRONTEND_URL_PLACEHOLDER
              networks:
                - gitintel-net
              healthcheck:
                test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 30s

          networks:
            gitintel-net:
              driver: bridge
          DOCKERCOMPOSE

          sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|$FRONTEND_IMAGE|g" docker-compose.yml
          sed -i "s|BACKEND_IMAGE_PLACEHOLDER|$BACKEND_IMAGE|g" docker-compose.yml
          sed -i "s|FRONTEND_URL_PLACEHOLDER|$FRONTEND_URL|g" docker-compose.yml

          echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u $REGISTRY_USERNAME --password-stdin
          echo "正在拉取镜像..."
          docker-compose pull
          echo "正在清理旧容器..."
          docker stop gitintel-frontend gitintel-backend 2>/dev/null || true
          docker rm gitintel-frontend gitintel-backend 2>/dev/null || true
          echo "正在启动服务..."
          docker-compose up -d
          sleep 10

          echo ""
          echo "========== 容器状态 =========="
          docker-compose ps

          FRONTEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' gitintel-frontend 2>/dev/null)
          BACKEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' gitintel-backend 2>/dev/null)
          FRONTEND_HEALTH=${FRONTEND_HEALTH:-unknown}
          BACKEND_HEALTH=${BACKEND_HEALTH:-unknown}

          echo ""
          echo "Frontend 健康状态: $FRONTEND_HEALTH"
          echo "Backend 健康状态: $BACKEND_HEALTH"

          if [ "$FRONTEND_HEALTH" = "healthy" ] && [ "$BACKEND_HEALTH" = "healthy" ]; then
            echo ""
            echo "✅ 部署成功！"
          else
            echo ""
            echo "⚠️ 容器已启动，部分健康检查可能需要更长时间"
          fi

          echo ""
          echo "========== 部署完成 =========="
          ENDSSH

  # ==================== 健康检查 ====================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    # deploy 跳过时此 job 自动取消（无法对未部署的服务器做健康检查）
    if: ${{ needs.deploy.result != 'skipped' }}

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/
          sparse-checkout-cone-mode: false

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # 等待容器启动（Next.js standalone 容器启动较慢）
      - name: Wait for containers to start
        run: |
          sleep 30
          echo "等待 30s 后的容器状态:"
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd ${{ env.DEPLOY_PATH }} && docker-compose ps"

      - name: Check frontend health
        run: |
          FRONTEND_URL="http://${{ secrets.SERVER_HOST }}:80"
          echo "检查 Frontend: $FRONTEND_URL"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sf --connect-timeout 10 -o /dev/null -w "%{http_code}" "$FRONTEND_URL" 2>&1 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Frontend 健康 (HTTP $HTTP_CODE)"
              break
            fi
            echo "Frontend 尚未就绪 (HTTP $HTTP_CODE)，等待 15 秒... (重试 $i/5)"
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Frontend 健康检查失败"
            echo "尝试 SSH 到服务器查看日志..."
            ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd ${{ env.DEPLOY_PATH }} && docker-compose logs --tail=30 frontend"
            exit 1
          fi

      - name: Check backend health
        run: |
          BACKEND_URL="http://${{ secrets.SERVER_HOST }}:8000/health"
          echo "检查 Backend: $BACKEND_URL"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sf --connect-timeout 10 -o /dev/null -w "%{http_code}" "$BACKEND_URL" 2>&1 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend 健康 (HTTP $HTTP_CODE)"
              break
            fi
            echo "Backend 尚未就绪 (HTTP $HTTP_CODE)，等待 15 秒... (重试 $i/5)"
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Backend 健康检查失败"
            echo "尝试 SSH 到服务器查看日志..."
            ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd ${{ env.DEPLOY_PATH }} && docker-compose logs --tail=30 backend"
            exit 1
          fi

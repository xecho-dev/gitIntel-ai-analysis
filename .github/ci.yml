# ============================================================
# GitIntel CI — 质量门禁流水线
#
# 触发条件：
#   - 所有分支的 push
#   - 所有分支的 PR
#
# 流程：Lint → 测试 → 构建
# ============================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ==================== Frontend CI ====================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test --coverage

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key

  # ==================== Admin CI ====================
  admin-ci:
    name: Admin CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # ==================== Backend CI ====================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Type check (Mypy)
        run: uv run mypy agents graph schemas services

      - name: Test (Pytest)
        run: uv run pytest -v --cov=agents --cov=graph --cov=schemas --cov=services --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ==================== Monorepo 构建检查 ====================
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-ci, admin-ci, backend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd backend && uv sync --all-extras

      - name: Build frontend Docker image
        run: |
          docker build \
            --target builder \
            --file Dockerfile.frontend \
            --tag gitintel-frontend:build-test \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-key \
            .

      - name: Build admin Docker image
        run: |
          docker build \
            --file Dockerfile.admin \
            --tag gitintel-admin:build-test \
            .

      - name: Build backend Docker image
        run: |
          docker build \
            --file Dockerfile.backend \
            --tag gitintel-backend:build-test \
            .

      - name: Docker images health check
        run: |
          docker images gitintel-frontend:build-test
          docker images gitintel-admin:build-test
          docker images gitintel-backend:build-test
